components:
  schemas:
    AgentDatabaseExecuteRead:
      properties:
        statement_type:
          type: string
          enum:
          - SELECT
          - INSERT
          - UPDATE
          - DELETE
          - ALTER
          title: Statement Type
        columns:
          items:
            type: string
          type: array
          title: Columns
        rows:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Rows
        row_count:
          type: integer
          title: Row Count
        affected_rows:
          anyOf:
          - type: integer
          - type: 'null'
          title: Affected Rows
        last_insert_id:
          anyOf:
          - type: string
          - type: integer
          - type: 'null'
          title: Last Insert Id
        truncated:
          type: boolean
          title: Truncated
          default: false
      type: object
      required:
      - statement_type
      - row_count
      title: AgentDatabaseExecuteRead
    AgentDatabaseExecuteRequest:
      properties:
        sql:
          type: string
          maxLength: 100000
          minLength: 1
          title: Sql
        parameters:
          additionalProperties:
            anyOf:
            - type: string
            - type: integer
            - type: number
            - type: boolean
            - type: 'null'
          type: object
          title: Parameters
        max_rows:
          type: integer
          maximum: 5000.0
          minimum: 1.0
          title: Max Rows
          default: 1000
      additionalProperties: false
      type: object
      required:
      - sql
      title: AgentDatabaseExecuteRequest
    AgentDatabaseSchemaRead:
      properties:
        tables:
          items:
            additionalProperties: true
            type: object
          type: array
          title: Tables
      type: object
      required:
      - tables
      title: AgentDatabaseSchemaRead
    AiSearchExpandRead:
      properties:
        original:
          type: string
          title: Original
        expanded:
          type: string
          title: Expanded
      type: object
      required:
      - original
      - expanded
      title: AiSearchExpandRead
    AiSearchExpandRequest:
      properties:
        value:
          type: string
          maxLength: 500
          minLength: 1
          title: Value
      additionalProperties: false
      type: object
      required:
      - value
      title: AiSearchExpandRequest
    AiSearchSettingsRead:
      properties:
        endpoint:
          type: string
          title: Endpoint
        api_key:
          type: string
          title: Api Key
        model:
          type: string
          title: Model
        enabled:
          type: boolean
          title: Enabled
        updated_at:
          anyOf:
          - type: string
            format: date-time
          - type: 'null'
          title: Updated At
        version:
          type: integer
          title: Version
      type: object
      required:
      - endpoint
      - api_key
      - model
      - enabled
      - version
      title: AiSearchSettingsRead
    AiSearchSettingsUpdate:
      properties:
        endpoint:
          type: string
          maxLength: 500
          minLength: 1
          title: Endpoint
        api_key:
          type: string
          maxLength: 1000
          minLength: 1
          title: Api Key
        model:
          type: string
          maxLength: 128
          minLength: 1
          title: Model
        enabled:
          type: boolean
          title: Enabled
          default: true
        version:
          type: integer
          minimum: 0.0
          title: Version
      additionalProperties: false
      type: object
      required:
      - endpoint
      - api_key
      - model
      - version
      title: AiSearchSettingsUpdate
    AiSearchStatusRead:
      properties:
        available:
          type: boolean
          title: Available
      type: object
      required:
      - available
      title: AiSearchStatusRead
    AiSearchTestRead:
      properties:
        original:
          type: string
          title: Original
        expanded:
          type: string
          title: Expanded
      type: object
      required:
      - original
      - expanded
      title: AiSearchTestRead
    ApiError:
      properties:
        code:
          type: string
          title: Code
        message:
          type: string
          title: Message
        details:
          additionalProperties: true
          type: object
          title: Details
