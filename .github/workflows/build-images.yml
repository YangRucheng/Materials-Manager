name: 构建并推送 Docker 镜像

on:
  push:
    branches: [main]
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

concurrency:
  group: docker-${{ github.ref }}
  cancel-in-progress: true

env:
  REGISTRY: docker.io
  DOCKERHUB_NAMESPACE: yangrucheng

jobs:
  build:
    name: 构建${{ matrix.display_name }}
    runs-on: ubuntu-latest
    strategy:
      fail-fast: false
      matrix:
        include:
          - component: backend
            display_name: 后端镜像
            context: ./backend
          - component: frontend
            display_name: 前端镜像
            context: ./frontend

    steps:
      - name: 检出代码
        uses: actions/checkout@v4

      - name: 配置 Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: 登录 Docker Hub
        uses: docker/login-action@v3
        with:
          registry: ${{ env.REGISTRY }}
          username: ${{ secrets.CCR_USERNAME }}
          password: ${{ secrets.CCR_PASSWORD }}

      - name: 生成镜像元数据
        id: meta
        uses: docker/metadata-action@v5
        with:
          images: ${{ env.REGISTRY }}/${{ env.DOCKERHUB_NAMESPACE }}/materials-manager
          tags: |
            type=raw,value=${{ matrix.component }},enable=${{ github.ref == 'refs/heads/main' }}
            type=sha,prefix=${{ matrix.component }}-sha-
            type=ref,event=tag,prefix=${{ matrix.component }}-

      - name: 构建并推送镜像
        uses: docker/build-push-action@v6
        with:
          context: ${{ matrix.context }}
          push: true
          platforms: linux/amd64
          tags: ${{ steps.meta.outputs.tags }}
          labels: ${{ steps.meta.outputs.labels }}
          cache-from: type=gha,scope=${{ matrix.component }}
          cache-to: type=gha,mode=max,scope=${{ matrix.component }}
          provenance: false
          sbom: false
